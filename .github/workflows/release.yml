name: Release

on:
  push:
    tags: [ 'v*' ]

permissions:
  contents: write

jobs:
  build:
    name: Publish ${{ matrix.rid }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: win-x64
            archive: zip
          - rid: linux-x64
            archive: tar
          - rid: osx-arm64
            archive: tar

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Extract version from tag
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Publish self-contained single-file
        run: |
          dotnet publish src/ConfluencePageExporter/ConfluencePageExporter.csproj \
            -c Release \
            -r ${{ matrix.rid }} \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -p:EnableCompressionInSingleFile=true \
            -p:DebugType=embedded \
            -p:Version=${{ steps.version.outputs.value }} \
            -o publish/${{ matrix.rid }}

      - name: Stage release files
        run: |
          cp README.md LICENSE publish/${{ matrix.rid }}/

      - name: Create archive
        id: package
        run: |
          mkdir -p artifacts
          name="ConfluencePageExporter-v${{ steps.version.outputs.value }}-${{ matrix.rid }}"
          if [ "${{ matrix.archive }}" = "zip" ]; then
            (cd publish/${{ matrix.rid }} && zip -r "../../artifacts/${name}.zip" .)
            echo "path=artifacts/${name}.zip" >> "$GITHUB_OUTPUT"
          else
            tar -czf "artifacts/${name}.tar.gz" -C publish/${{ matrix.rid }} .
            echo "path=artifacts/${name}.tar.gz" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.rid }}
          path: ${{ steps.package.outputs.path }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          fail_on_unmatched_files: true
