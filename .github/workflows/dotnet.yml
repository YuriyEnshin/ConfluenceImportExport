# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest

    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build --no-restore
    - name: Test
      run: dotnet test --no-build -- --report-trx --report-trx-filename tests.trx --results-directory ${{ github.workspace }}/TestResults
    - name: Upload TRX report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: TestResults/tests.trx
    - name: Publish test report
      if: always()
      uses: dorny/test-reporter@v2
      with:
        name: xUnit tests
        path: TestResults/tests.trx
        reporter: dotnet-trx
        fail-on-error: false
